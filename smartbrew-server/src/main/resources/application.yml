server:
  port: 8080

spring:
  application:
    name: smartbrew-server

  # MySQL 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smartbrew?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # SQL 初始化（首次启动时自动建表）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MQTT 配置
mqtt:
  broker-url: tcp://localhost:1883
  client-id: smartbrew_server_001
  username: smartbrew
  password: smartbrew2024
  topics:
    data: smartbrew/+/data
    heartbeat: smartbrew/+/heartbeat
    status: smartbrew/+/status
  qos: 1
  keep-alive-interval: 60
  connection-timeout: 30

# 日志
logging:
  level:
    com.smartbrew: DEBUG
    org.eclipse.paho: WARN
